<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        .heart-container {
            position: relative;
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            animation: rotateHeart 15s linear infinite;
        }

        .love-text {
            position: absolute;
            color: #ff7675;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 118, 117, 0.8);
            white-space: nowrap;
        }

        @keyframes rotateHeart {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
    </style>
</head>
<body>

<div class="heart-container" id="heart"></div>

<script>
    const heartContainer = document.getElementById('heart');
    const totalText = 60; // Jumlah teks "I Love You"

    for (let i = 0; i < totalText; i++) {
        const textElement = document.createElement('div');
        textElement.className = 'love-text';
        textElement.innerText = 'I Love You';

        // Rumus matematika untuk membentuk formasi hati 3D (Math Rose/Heart Curve)
        const t = (i / totalText) * 2 * Math.PI;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
        
        // Mengatur posisi dan rotasi acak 3D agar membentuk bola hati
        const phi = Math.acos(-1 + (2 * i) / totalText);
        const theta = Math.sqrt(totalText * Math.PI) * phi;

        const posX = 100 * Math.sin(phi) * Math.cos(theta);
        const posY = 100 * Math.sin(phi) * Math.sin(theta);
        const posZ = 100 * Math.cos(phi);

        textElement.style.transform = `translate3d(${posX + 100}px, ${posY + 100}px, ${posZ}px)`;
        heartContainer.appendChild(textElement);
    }
</script>

</body>
</html>
