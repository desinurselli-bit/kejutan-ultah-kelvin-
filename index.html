<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Boyfiee ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="page1">
        <h1>🎂 HAPPY BIRTHDAY 🎂</h1>
        <h2>BOYFIEE ❤️</h2>
        <button id="startBtn">🎁 Mulai Kejutan</button>
    </div>

    <div id="page2" class="hidden">
        <h2>Buatlah Harapanmu ❤️</h2>
        <div id="cakeEmoji" style="font-size: 5em;">🎂</div>
        <button id="blowBtn">💨 Tiup Lilin</button>
    </div>

    <div id="page3" class="hidden">
        <h2>💌 Untuk Hasianku ❤️</h2>
        <div class="surat">
            <p>Selamat ulang tahun yang ke-20, Hasianku. Sehat selalu dan sukses terus ya.</p>
            <p>Terima kasih sudah setia bersamaku selama 4 tahun ini.</p>
            <button id="fotoBtn">📸 Lihat Kenangan Kita</button>
        </div>
    </div>

    <div id="page4" class="hidden">
        <h2>❤️ KELVIN & DESY ❤️</h2>
        <img src="foto.jpg" alt="Foto" style="width: 200px; border-radius: 50%; border: 4px solid white;">
        <br>
        <button id="akhirBtn">❤️ Pesan Terakhir</button>
    </div>

    <div id="page5" class="hidden">
        <p>Tetap jadi Kelvin yang aku kenal ya. I Love You!</p>
        <button id="pemicuKejutan">❤️ KLIK INI SAYANG ❤️</button>
        
        <div id="love-3d-container" class="hidden">
            <div class="heart-container" id="heart"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
